name: Collect streaming data

on:
  workflow_dispatch:
    inputs:
      youtube_max_pages:
        description: "YouTube upload pages per channel. 1 page = up to 50 videos."
        required: true
        default: "1"
      twitch_max_pages:
        description: "Twitch VOD pages per channel. 1 page = up to 100 VODs."
        required: true
        default: "1"
  schedule:
    # Daily at 18:20 UTC = 03:20 JST. Keep this conservative for API quota and Actions usage.
    - cron: "20 18 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PAGES_BASE_URL: ${{ vars.PAGES_BASE_URL || 'https://ps-analyzer.pages.dev' }}

jobs:
  collect:
    runs-on: ubuntu-latest

    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
      YOUTUBE_MAX_PAGES: ${{ inputs.youtube_max_pages || '1' }}
      TWITCH_MAX_PAGES: ${{ inputs.twitch_max_pages || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check secrets
        run: |
          missing=0
          for name in YOUTUBE_API_KEY TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing repository secret::$name is not set or is empty."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Compile scripts
        run: |
          python3 -m py_compile \
            scripts/common.py \
            scripts/init_db.py \
            scripts/import_deck_links.py \
            scripts/fetch_youtube_archives.py \
            scripts/fetch_twitch_vods.py \
            scripts/build_streaming_report.py \
            scripts/build_streaming_dashboard.py

      - name: Initialize database
        run: python3 scripts/init_db.py

      - name: Fetch YouTube archives
        run: python3 scripts/fetch_youtube_archives.py --max-pages "$YOUTUBE_MAX_PAGES"

      - name: Fetch Twitch VODs
        run: python3 scripts/fetch_twitch_vods.py --max-pages "$TWITCH_MAX_PAGES"

      - name: Import deck links
        run: python3 scripts/import_deck_links.py

      - name: Build reports
        run: python3 scripts/build_streaming_report.py --summary

      - name: Build dashboard
        env:
          SAVE_API_ENDPOINT: ${{ vars.SAVE_API_ENDPOINT }}
        run: python3 scripts/build_streaming_dashboard.py

      - name: Write dashboard URL summary
        run: |
          set -euo pipefail
          production_url="${PAGES_BASE_URL%/}"
          {
            echo "## Dashboard"
            echo
            echo "The dashboard will be deployed to Cloudflare Pages by the \`Publish dashboard\` workflow:"
            echo
            if [ "$GITHUB_REF_NAME" = "main" ]; then
              echo "- Production URL: ${production_url}/"
            else
              echo "- Branch preview URL: shown after deploy in the \`Publish dashboard\` workflow summary and the Cloudflare Pages check/comment."
              echo "- Do not construct a preview URL from this branch name. Cloudflare Pages may shorten branch aliases."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload SQLite database, reports, and dashboard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streaming-data
          path: |
            data/streams.sqlite
            reports/*.csv
            public/**
          if-no-files-found: warn

      - name: Upload dashboard site artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-site
          path: public
          retention-days: 7
