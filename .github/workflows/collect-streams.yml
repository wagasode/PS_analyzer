name: Collect streaming data

on:
  workflow_dispatch:
    inputs:
      youtube_max_pages:
        description: "YouTube upload pages per channel. 1 page = up to 50 videos."
        required: true
        default: "1"
      twitch_max_pages:
        description: "Twitch VOD pages per channel. 1 page = up to 100 VODs."
        required: true
        default: "1"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check secrets
        run: |
          missing=0
          for name in YOUTUBE_API_KEY TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing repository secret::$name is not set or is empty."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Compile scripts
        run: |
          python3 -m py_compile \
            scripts/common.py \
            scripts/init_db.py \
            scripts/fetch_youtube_archives.py \
            scripts/fetch_twitch_vods.py \
            scripts/build_streaming_report.py \
            scripts/build_streaming_dashboard.py

      - name: Initialize database
        run: python3 scripts/init_db.py

      - name: Fetch YouTube archives
        run: python3 scripts/fetch_youtube_archives.py --max-pages "${{ inputs.youtube_max_pages }}"

      - name: Fetch Twitch VODs
        run: python3 scripts/fetch_twitch_vods.py --max-pages "${{ inputs.twitch_max_pages }}"

      - name: Build reports
        run: python3 scripts/build_streaming_report.py --summary

      - name: Build dashboard
        run: python3 scripts/build_streaming_dashboard.py

      - name: Upload SQLite database and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: streaming-data
          path: |
            data/streams.sqlite
            reports/*.csv
          if-no-files-found: warn

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload dashboard Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy dashboard to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
