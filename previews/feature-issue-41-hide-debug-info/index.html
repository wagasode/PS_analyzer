<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>配信レポート</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #64748b;
      --border: #d7dde6;
      --accent: #0f766e;
      --accent-soft: #dff7f3;
      --warn: #9a3412;
      --warn-soft: #ffedd5;
      --bad: #991b1b;
      --bad-soft: #fee2e2;
      --none: #475569;
      --none-soft: #e2e8f0;
      --shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 0 22px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      min-height: 36px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .debug-info {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .debug-info summary {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
    }

    .debug-list {
      display: grid;
      grid-template-columns: max-content minmax(0, 1fr);
      gap: 4px 10px;
      margin: 8px 0 10px;
      max-width: 720px;
    }

    .debug-list dt {
      color: var(--text);
      font-weight: 700;
    }

    .debug-list dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .debug-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    main {
      padding: 24px 0 40px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin: 18px 0;
    }

    .tabs {
      display: inline-flex;
      padding: 3px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }

    .tab {
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      padding: 0 14px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      cursor: pointer;
    }

    .tab.active {
      background: var(--accent);
      color: #fff;
    }

    .search {
      width: min(380px, 100%);
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      color: var(--text);
      font: inherit;
      box-shadow: var(--shadow);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) clamp(320px, 34vw, 440px);
      gap: 16px;
      align-items: start;
    }

    .timeline-panel {
      display: none;
    }

    .workspace.player-mode .timeline-panel,
    .workspace.deck-mode .timeline-panel {
      display: block;
    }

    .workspace.team-mode {
      grid-template-columns: 1fr;
    }

    .workspace.team-mode .timeline-panel {
      display: none;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .toggle input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .count {
      color: var(--muted);
      font-size: 14px;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 300px);
    }

    .player-table-wrap {
      max-height: calc(100vh - 250px);
    }

    .player-table-wrap table {
      min-width: 520px;
    }

    .deck-table-wrap table {
      min-width: 640px;
    }

    .player-detail-table-wrap table {
      min-width: 980px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 980px;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eef2f7;
      color: #334155;
      font-weight: 700;
      user-select: none;
    }

    th.sortable {
      cursor: pointer;
    }

    th.sortable::after {
      content: "↕";
      margin-left: 6px;
      color: #94a3b8;
      font-size: 12px;
    }

    th.sorted-asc::after {
      content: "↑";
      color: var(--accent);
    }

    th.sorted-desc::after {
      content: "↓";
      color: var(--accent);
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    tbody tr.deck-class-row {
      background: linear-gradient(90deg, var(--deck-class-border, var(--border)) 0 6px, var(--deck-class-row, #fff) 6px 38px, #fff 38px);
    }

    tbody tr.deck-class-row:hover {
      background: linear-gradient(90deg, var(--deck-class-border, var(--border)) 0 6px, var(--deck-class-soft, #f8fafc) 6px 38px, #f8fafc 38px);
    }

    td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    td.action {
      text-align: center;
    }

    .player-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: inherit;
    }

    .player-label.heading {
      gap: 12px;
    }

    .avatar {
      position: relative;
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--none-soft);
      color: var(--none);
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
    }

    .player-label.heading .avatar {
      width: 40px;
      height: 40px;
      font-size: 13px;
    }

    .avatar img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: var(--panel);
    }

    .detail-button {
      min-height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    .detail-button.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .status.ok {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .status.skipped {
      background: var(--warn-soft);
      color: var(--warn);
    }

    .status.failed {
      background: var(--bad-soft);
      color: var(--bad);
    }

    .status.no_channel,
    .status.not_checked {
      background: var(--none-soft);
      color: var(--none);
    }

    .empty {
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
    }

    .timeline-summary {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      flex-wrap: wrap;
    }

    .timeline-list {
      display: grid;
      gap: 0;
      max-height: calc(100vh - 300px);
      overflow: auto;
    }

    .timeline-item {
      display: grid;
      gap: 12px;
      align-items: start;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .timeline-item:last-child {
      border-bottom: 0;
    }

    .timeline-date {
      display: grid;
      gap: 4px;
      font-variant-numeric: tabular-nums;
    }

    .timeline-date strong {
      font-size: 14px;
      line-height: 1.4;
    }

    .timeline-date span,
    .timeline-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .timeline-thumbnail {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #eef2f7;
      color: var(--muted);
      text-decoration: none;
    }

    .timeline-thumbnail img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .timeline-thumbnail.missing {
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
    }

    .timeline-main {
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .timeline-title {
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .timeline-title:hover {
      text-decoration: underline;
    }

    .timeline-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      padding: 0 8px;
      background: var(--none-soft);
      color: var(--none);
      font-size: 12px;
      font-weight: 700;
    }

    .pill.youtube {
      background: #fee2e2;
      color: #b91c1c;
    }

    .pill.twitch {
      background: #ede9fe;
      color: #6d28d9;
    }

    .pill.related {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .pill.deck {
      border: 1px solid var(--deck-class-border, #bae6fd);
      background: var(--deck-class-soft, #e0f2fe);
      color: var(--deck-class-color, #075985);
      text-decoration: none;
    }

    .deck-class-e {
      --deck-class-color: #166534;
      --deck-class-soft: #dcfce7;
      --deck-class-border: #86efac;
      --deck-class-row: #f2fbf4;
    }

    .deck-class-r {
      --deck-class-color: #854d0e;
      --deck-class-soft: #fef9c3;
      --deck-class-border: #fde047;
      --deck-class-row: #fffbea;
    }

    .deck-class-w {
      --deck-class-color: #1d4ed8;
      --deck-class-soft: #dbeafe;
      --deck-class-border: #93c5fd;
      --deck-class-row: #f1f7ff;
    }

    .deck-class-d {
      --deck-class-color: #c2410c;
      --deck-class-soft: #ffedd5;
      --deck-class-border: #fdba74;
      --deck-class-row: #fff7ed;
    }

    .deck-class-ni {
      --deck-class-color: #78350f;
      --deck-class-soft: #f3e4d0;
      --deck-class-border: #d6a977;
      --deck-class-row: #fbf4ec;
    }

    .deck-class-b {
      --deck-class-color: #475569;
      --deck-class-soft: #e2e8f0;
      --deck-class-border: #94a3b8;
      --deck-class-row: #f4f7fb;
    }

    .deck-class-nm {
      --deck-class-color: #0e7490;
      --deck-class-soft: #cffafe;
      --deck-class-border: #67e8f9;
      --deck-class-row: #ecfeff;
    }

    .deck-class-unknown {
      --deck-class-color: var(--none);
      --deck-class-soft: var(--none-soft);
      --deck-class-border: var(--border);
      --deck-class-row: #f8fafc;
    }

    .deck-cell {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .deck-cell-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .deck-cell-meta {
      color: var(--muted);
      font-size: 12px;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .deck-class-badge,
    .deck-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 24px;
      max-width: 100%;
      border: 1px solid var(--deck-class-border, var(--border));
      border-radius: 999px;
      padding: 0 8px;
      background: var(--deck-class-soft, var(--none-soft));
      color: var(--deck-class-color, var(--none));
      font-size: 12px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .deck-class-dot {
      flex: 0 0 auto;
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--deck-class-color, var(--none));
    }

    .deck-class-badge strong,
    .deck-legend-item strong {
      font-size: 11px;
      font-weight: 800;
    }

    .deck-class-legend {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .timeline-note {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
      white-space: normal;
    }

    .timeline-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0 12px;
      color: var(--text);
      text-decoration: none;
      box-shadow: var(--shadow);
      white-space: nowrap;
      justify-self: start;
    }

    .stream-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .change-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin: 0 0 18px;
      padding: 12px 14px;
      border: 1px solid #bae6fd;
      border-radius: 8px;
      background: #f0f9ff;
      color: #075985;
      box-shadow: var(--shadow);
      font-size: 14px;
    }

    .change-actions,
    .modal-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .save-status {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .save-status[hidden] {
      display: none;
    }

    .save-feedback {
      margin: -4px 0 12px;
    }

    .modal-save-feedback {
      margin-top: 6px;
    }

    .save-status.ok {
      color: var(--accent);
      font-weight: 700;
    }

    .save-status.error {
      color: var(--bad);
      font-weight: 700;
    }

    .status-details {
      margin-top: 6px;
      color: var(--text);
      font-weight: 400;
    }

    .status-details summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 700;
    }

    .status-details pre {
      margin: 6px 0 0;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #f8fafc;
      color: var(--text);
      font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .draft-panel {
      margin: -6px 0 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .draft-panel h3 {
      margin: 0;
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }

    .draft-list {
      display: grid;
      gap: 0;
    }

    .draft-item {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }

    .draft-item:last-child {
      border-bottom: 0;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(15, 23, 42, 0.42);
    }

    .modal {
      width: min(920px, 100%);
      max-height: min(820px, calc(100vh - 40px));
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.25);
    }

    #deck-editor-modal .modal {
      width: min(1180px, 100%);
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .modal-body {
      display: grid;
      gap: 18px;
      padding: 16px;
      overflow: auto;
    }

    .deck-editor-layout {
      display: grid;
      grid-template-columns: minmax(340px, 0.95fr) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }

    .editor-form-stack {
      display: grid;
      gap: 18px;
      min-width: 0;
    }

    .editor-section {
      display: grid;
      gap: 10px;
    }

    .editor-section h3 {
      margin: 0;
      font-size: 15px;
    }

    .video-panel {
      display: grid;
      gap: 12px;
      min-width: 0;
      position: sticky;
      top: 0;
      align-self: start;
    }

    .video-platforms,
    .video-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .platform-choice.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
    }

    .video-frame {
      display: grid;
      place-items: center;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #0f172a;
      color: #e2e8f0;
    }

    .video-frame iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }

    .video-placeholder {
      display: grid;
      gap: 6px;
      padding: 18px;
      text-align: center;
      color: #e2e8f0;
    }

    .video-placeholder strong {
      font-size: 15px;
    }

    .video-placeholder span,
    .video-meta {
      color: var(--muted);
      font-size: 13px;
      overflow-wrap: anywhere;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field input,
    .field select,
    .field textarea,
    .editor-input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--text);
      font: inherit;
      background: var(--panel);
    }

    .field textarea {
      min-height: 76px;
      resize: vertical;
    }

    .linked-decks,
    .search-results {
      display: grid;
      gap: 8px;
    }

    .linked-deck,
    .search-result {
      display: grid;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
    }

    .deck-card {
      border-color: var(--deck-class-border, var(--border));
      background: linear-gradient(90deg, var(--deck-class-border, var(--border)) 0 5px, var(--deck-class-row, #f8fafc) 5px);
    }

    .linked-deck-head,
    .search-result {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .linked-deck-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .deck-heading {
      display: grid;
      gap: 2px;
      min-width: 0;
    }

    .deck-heading-title {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;

<body>
  <header>
    <div class="shell topbar">
      <div>
        <h1>配信レポート</h1>

  <script>
    const numberFields = new Set(["stream_count", "player_count", "total_hours", "shadowverse_hours", "youtube_hours", "twitch_hours"]);
    const statusFields = new Set(["youtube_channel_status", "twitch_channel_status"]);
    const state = {

    const columns = {

      ],
      playerDetail: [

        ["stream_count", "配信数"],
        ["total_hours", "総配信時間"],

      ],

      ]
    };

    const viewLabels = {
      team: "チーム別",

      deck: "デッキ別"
    };

    const statusLabels = {
      ok: "正常",
      skipped: "スキップ",
      failed: "失敗",
      no_channel: "チャンネルなし",
      not_checked: "未確認",
      unknown: "不明"
    };
    const deckClassDefinitions = [
      {
            "value": "E",
            "display_name": "エルフ",
            "color_name": "緑",
            "css_class": "deck-class-e",
            "aliases": [
                  "E",
                  "ELF",
                  "エルフ"
            ]
      },
      {
            "value": "R",
            "display_name": "ロイヤル",
            "color_name": "黄色",
            "css_class": "deck-class-r",
            "aliases": [
                  "R",
                  "ROYAL",
                  "ロイヤル"
            ]
      },
      {
            "value": "W",
            "display_name": "ウィッチ",
            "color_name": "青",
            "css_class": "deck-class-w",
            "aliases": [
                  "W",

            ]
      },
      {

            "aliases": [
                  "D",
                  "DRAGON",
